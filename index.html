<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container text-center">
        <h1 class="neon-text mb-4">NEON WEATHER</h1>
        
        <div class="search-box mx-auto mb-5 d-flex align-items-center">
            <input type="text" id="cityInput" placeholder="Busca una ciudad..." class="form-control">
            <button id="searchBtn" class="btn-neon">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div id="weatherContainer" class="row g-4 justify-content-center">
            </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
